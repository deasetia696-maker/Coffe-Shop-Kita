<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keranjang Belanja - Coffee Shop Kita</title>
  <style>
    /* --- FONTS & GLOBAL RESET --- */
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background-color: #f7f1eb; /* Warna latar belakang krem hangat (Warm Beige) */
      color: #433422;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* --- HEADER SECTION --- */
    header {
      width: 100%;
      max-width: 480px;
      text-align: center;
      margin-bottom: 28px;
    }

    header h2 {
      font-size: 26px;
      font-weight: 700;
      color: #2d1f10;
      margin-bottom: 6px;
    }

    nav a {
      text-decoration: none;
      color: #8c6a42;
      font-size: 13px;
      font-weight: 600;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #2d1f10;
    }

    /* --- MAIN CONTAINER (KARTU LATTE) --- */
    .order-container {
      width: 100%;
      max-width: 480px;
      background: #ebdccb; /* Warna cokelat susu / soft latte hangat */
      padding: 30px 24px;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(67, 52, 34, 0.1); /* Bayangan lembut bertema cokelat */
      border: 1px solid #dfcdb9;
    }

    /* --- DAFTAR ITEM PESANAN --- */
    #orderList {
      list-style: none;
      padding: 0;
    }

    #orderList li {
      background: #f4eae1; /* Kontras lebih terang di dalam kartu */
      margin-bottom: 14px;
      padding: 18px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #e3d2c1;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #orderList li:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(67, 52, 34, 0.05);
    }

    /* Struktur teks menu */
    #orderList li span {
      font-size: 15px;
      font-weight: 700;
      color: #433422;
    }

    #orderList li strong {
      display: block;
      font-size: 13px;
      color: #8c6a42;
      margin-top: 4px;
      font-weight: 600;
    }

    /* --- TOMBOL HAPUS MINIMALIS --- */
    .remove-btn {
      background: #fcebeb; /* Merah pastel transparan */
      color: #e74c3c;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .remove-btn:hover {
      background: #e74c3c;
      color: #ffffff;
    }

    /* --- TOTAL HARGA BAR --- */
    .total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      font-weight: 600;
      color: #634d35;
      margin: 24px 0;
      padding-top: 20px;
      border-top: 2px dashed #cfbda8;
    }

    #totalPrice {
      font-size: 22px;
      font-weight: 700;
      color: #2d1f10;
    }

    /* --- TOMBOL CHECKOUT (ESPRESSO LOOK) --- */
    .btn-checkout {
      display: block;
      width: 100%;
      background: #4a3319; /* Cokelat tua espresso premium */
      color: #ffffff;
      border: none;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 16px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(74, 51, 25, 0.2);
    }

    .btn-checkout:hover {
      background: #332210;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <header>
    <h2>🛒 Keranjang Belanja</h2>
    <nav><a href="menu.html">← Kembali ke Menu</a></nav>
  </header>

  <div class="order-container">
    <ul id="orderList"></ul>
    
    <div class="total">
      <span>Total Harga:</span>
      <span id="totalPrice">Rp 0</span>
    </div>

    <button class="btn-checkout" onclick="payOrder()">Kirim Pesanan Ke Kasir</button>
  </div>

<!-- Tambahan: tampilkan nomor meja -->
<div class="cart-meja">
  <span>Nomor Meja:</span>
  <span id="cartMeja">-</span>
</div>


  <script src="script.js"></script>
</body>
</html>
